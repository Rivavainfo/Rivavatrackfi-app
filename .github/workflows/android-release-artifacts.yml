name: Android Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-release-artifacts:
    name: Build APK and AAB
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APKs and AABs
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: ./gradlew assemblePlayRelease assembleFullSmsRelease bundlePlayRelease bundleFullSmsRelease

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: rivava-release-apks
          path: app/build/outputs/apk/**/*release*.apk
          if-no-files-found: error

      - name: Upload release AABs
        uses: actions/upload-artifact@v4
        with:
          name: rivava-release-aabs
          path: app/build/outputs/bundle/**/*Release/*.aab
          if-no-files-found: error
