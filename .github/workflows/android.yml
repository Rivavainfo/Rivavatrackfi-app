name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      id: setup_java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Configure Gradle to use workflow JDK
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.java.home=${{ steps.setup_java.outputs.path }}" >> ~/.gradle/gradle.properties

    - name: Handle Keystore
      env:
        ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
      run: |
        if [ -n "$ANDROID_KEYSTORE" ]; then
          echo "$ANDROID_KEYSTORE" | base64 --decode > app/release.keystore
        else
          keytool -genkeypair -v -keystore app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Rivava, OU=Mobile, O=Rivava, L=Global, S=NA, C=US"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle Debug
      run: ./gradlew assembleDebug --stacktrace --info

    - name: Build with Gradle Release
      env:
        KEYSTORE_PATH: release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'password' }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'release' }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'password' }}
      run: |
        ./gradlew assembleRelease --stacktrace --info
        ./gradlew bundleRelease --stacktrace --info

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: rivava-release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: rivava-release-aab
        path: app/build/outputs/bundle/release/*.aab
