name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      run: |
        # Using the correct secret name: BASE64_KEYSTORE
        if [ -n "${{ secrets.BASE64_KEYSTORE }}" ]; then
          echo "${{ secrets.BASE64_KEYSTORE }}" | base64 --decode > app/release-key.jks
          echo "✅ Keystore decoded from BASE64_KEYSTORE"
        else
          echo "⚠️ BASE64_KEYSTORE not found, generating temporary debug key..."
          keytool -genkeypair -v -keystore app/release-key.jks -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Rivava, OU=Mobile, O=Rivava, L=Global, S=NA, C=US"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle Release
      env:
        # These names must match your build.gradle.kts System.getenv() calls
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        # API Keys for BuildConfig
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      run: ./gradlew assembleRelease bundleRelease --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: rivava-release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: rivava-release-aab
        path: app/build/outputs/bundle/release/*.aab
