name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Configure Gradle to use workflow JDK
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.java.home=$JAVA_HOME" >> ~/.gradle/gradle.properties

    - name: Decode Keystore
      run: |
        if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release-key.jks
        else
          keytool -genkeypair -v -keystore app/release-key.jks -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Rivava, OU=Mobile, O=Rivava, L=Global, S=NA, C=US"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Verify Keystore File
      run: ls -la app/

    - name: Validate Signing Config
      env:
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: |
        if [ -z "$RELEASE_STORE_PASSWORD" ]; then echo "Missing RELEASE_STORE_PASSWORD"; exit 1; fi
        if [ -z "$RELEASE_KEY_ALIAS" ]; then echo "Missing RELEASE_KEY_ALIAS"; exit 1; fi

    - name: Clean Project
      run: ./gradlew clean

    - name: Build with Gradle Debug
      run: ./gradlew assembleDebug --stacktrace --info

    - name: Build with Gradle Release
      env:
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      run: |
        ./gradlew assembleRelease --stacktrace --info
        ./gradlew bundleRelease --stacktrace --info

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: rivava-release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: rivava-release-aab
        path: app/build/outputs/bundle/release/*.aab
