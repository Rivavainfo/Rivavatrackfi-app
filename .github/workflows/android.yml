name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Configure Gradle to use workflow JDK
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.java.home=$JAVA_HOME" >> ~/.gradle/gradle.properties

    - name: Handle Keystore
      env:
        BASE64_KEYSTORE: ${{ secrets.BASE64_KEYSTORE }}
      run: |
        if [ -n "$BASE64_KEYSTORE" ]; then
          echo "$BASE64_KEYSTORE" | base64 --decode > app/release.keystore
        else
          keytool -genkeypair -v -keystore app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Rivava, OU=Mobile, O=Rivava, L=Global, S=NA, C=US"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle Debug
      run: ./gradlew assembleDebug --stacktrace --info

    - name: Build with Gradle Release
      env:
        STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: |
        ./gradlew assembleRelease --stacktrace --info
        ./gradlew bundleRelease --stacktrace --info

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: rivava-release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: rivava-release-aab
        path: app/build/outputs/bundle/release/*.aab
